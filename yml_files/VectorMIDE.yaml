experiment_type: VectorMIDE
seed: 123

# Device switch:
# - Mac local debugging: device: mps
# - A100/Linux server: device: cuda or cuda:0
# - Portable default: device: auto
# If allow_device_fallback is false, the script fails when the requested
# device is unavailable instead of silently choosing another backend.
device: auto
allow_device_fallback: true

n_dim: 3
p_dim: 2
m_dim: 6
height_target: 140

img_size: 40
in_channels: 6
hidden_dim: 64
output_dim: 18
mu_scale_init: 10.0
component_mixing_floor: 0.01

# Neural advection encoder:
# - cnn: each NWP map is encoded independently
# - cnn_transformer: CNN spatial features followed by temporal Transformer
network_type: cnn_transformer
transformer_d_model: 128
transformer_nhead: 4
transformer_layers: 2
transformer_dim_feedforward: 256
transformer_dropout: 0.1
transformer_causal: true
transformer_max_len: 4096

nwp_channel_names:
  - u100
  - v100
  - u140
  - v140
  - u180
  - v180

dt: 1.0
dt_seconds: 600.0
time_mode: target_only
gamma: 0.0
learnable_gamma: false

row_normalize: true
use_spectral_scaling: false
spectral_radius: 0.98
kernel_jitter: 1.0e-5
kalman_jitter: 1.0e-5
ell_init: 80.0
ell_min: 5.0
ell_max: 300.0

q_init: 0.2
r_init: 0.2

window_size: 1008
rolling_window_size: 24
batch_size: 1
steps_per_epoch: 50

lr_cnn: 1.0e-4
lr_heads: 5.0e-4
lr_kernel: 1.0e-3
lr_qr: 1.0e-3
weight_decay: 1.0e-4
grad_clip: 1.0

lambda_adv: 0.1
lambda_smooth: 0.001
lambda_reg: 0.0001
lambda_anchor: 0.01

offline_epochs_pretrain_adv: 20
offline_epochs_kf: 30
offline_epochs_finetune: 20

online_window_size: 168
online_update_every: 6
online_steps: 10

checkpoint_dir: checkpoints
offline_checkpoint_name: vector_mide_offline.pt
last_offline_checkpoint_name: vector_mide_offline_last.pt
online_checkpoint_name: vector_mide_online.pt
checkpoint_stage: joint
checkpoint_metric: loss_kf

data:
  offline_measurement_path: data/measurement/wv_h100_180_offline.mat
  offline_nwp_path: data/nwp/data_grid_offline.mat
  online_measurement_path: data/measurement/wv_h100_180_online.mat
  online_nwp_path: data/nwp/data_grid_online.mat

  # Measurement files include LatValue_vec/LonValue_vec and those exact
  # station coordinates are used by default. Set this to false to force
  # station_grid_indices or station_latlon below.
  use_measurement_station_coords: true

  # Optional fallback. These are zero-based [row, col] placeholders.
  station_grid_indices:
    - [18, 18]
    - [20, 20]
    - [22, 22]

  # Alternative exact form:
  # station_latlon:
  #   E05: [lat, lon]
  #   E06: [lat, lon]
  #   ASOW6: [lat, lon]

  advection_label_mode: simple
  patch_radius: 2
  standardize_x: true
  standardize_z: false
