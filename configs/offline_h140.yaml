measurement_file: ~/wind_ide/data/measurement/wv_h100_180_offline_imputed.mat
nwp_file: ~/wind_ide/data/nwp/data_grid_offline.mat

device: cuda
seed: 42
dt: 1.0
normalize_z: true
normalize_nwp: true

# seq_len:
#   advection 网络每次看多少帧 NWP 历史来输出一个时刻的 mu_t / Sigma_t
seq_len: 24

# ide_param_window:
#   连续多少个绝对时间步共用一组 IDE 参数
#   取 1 会退化成每个时刻一套 IDE 参数，通常太自由
ide_param_window: 4
ide_param_mode: global

# chunk_len:
#   每个训练样本里用于 IDE likelihood 的转移步数
#   stage 2 中每个样本会输出 chunk_len 个 advection 参数
chunk_len: 24

# forecast_horizon:
#   多步验证时递推预测的未来步数
forecast_horizon: 12
val_fraction: 0.2
num_workers: 0
num_gpus: 2

out_dir: outputs/offline_140m_01

# IDE stage
ide_batch_size: 128
ide_lr: 0.001
ide_epochs: 15
ide_max_steps: 100
skip_ide_warmup: true
train_ell_params: true

init_log_q_proc: -2
init_log_r_obs: -2
init_log_p0: 0.0
init_log_damping: 0.0
init_log_ell_par: 0.5
init_log_ell_perp: 0.0
q_proc_min: 0.02
q_proc_max: 0.5
r_obs_min: 0.02
r_obs_max: 0.75
damping_min: 0.02
damping_max: 0.5
noise_reg_weight: 0.0001

# ML stage
hidden_dim: 32
embed_dim: 32
num_heads: 4
num_layers: 2
ff_dim: 64
dropout: 0.1
mu_mode: anchored
sigma_mode: global

ml_batch_size: 128
ml_lr: 0.001
ml_epochs: 40
ml_max_steps: 100
stat_lr: 0.0001
smoothness_weight: 0.001
mu_scale: 0.75
chol_offdiag_scale: 0.15
chol_diag_max: 1.5
chol_eps: 0.0001
init_global_sigma_diag: 0.15
offline_rounds: 3
stat_epochs_per_round: 5
adv_epochs_per_round: 10
stat_max_steps: 100
adv_max_steps: 100
use_advection_in_stat: true
