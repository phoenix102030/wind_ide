measurement_file: ~/wind_ide/data/measurement/wv_h100_180_offline_imputed.mat
nwp_file: ~/wind_ide/data/nwp/data_grid_offline.mat
out_dir: outputs/offline_140m_01

device: cuda
seed: 42
num_gpus: 4
num_workers: 0

normalize_z: true
normalize_nwp: true
nwp_input_mode: all12
val_fraction: 0.2

# NWP history length used by the advection network.
seq_len: 24

# Number of future transitions supervised inside each training window.
chunk_len: 24

# Piecewise-constant IDE parameter sharing over absolute time.
ide_param_mode: global
ide_param_window: 4

# Joint training controls.
batch_size: 64
epochs: 30
max_steps: 100
mean_lr: 0.001
ide_lr: 0.0002

# Which IDE parameters still participate in joint optimization.
train_q_proc: true
train_r_obs: true
train_damping: true
train_p0: false
train_init_mean: false

# IDE parameter ranges / initialization.
dt: 1.0
init_log_q_proc: -2.0
init_log_r_obs: -2.0
init_log_damping: -2.5
q_proc_min: 0.02
q_proc_max: 0.2
r_obs_min: 0.02
r_obs_max: 0.25
damping_min: 0.02
damping_max: 0.5

# Forecast objective weights.
adv_one_step_weight: 1.0
adv_rollout_weight: 1.0
adv_history_len: 6
step_nll_weight: 0.5
asymmetry_weight: 0.01
noise_reg_weight: 0.0001
smoothness_weight: 0.001
transport_reg_weight: 0.0001
state_bias_reg_weight: 0.00001
sigma_cross_reg_weight: 0.0001

# Advection network capacity.
hidden_dim: 32
embed_dim: 32
num_heads: 4
num_layers: 2
ff_dim: 64
dropout: 0.1
mu_mode: anchored
sigma_mode: network

# Advection parameterization.
mu_scale: 1.25
chol_offdiag_scale: 0.15
chol_diag_max: 1.5
chol_eps: 0.0001
init_global_sigma_diag: 0.15

# Deterministic base kernel shape.
init_base_scale_par: 1.0
init_base_scale_perp: 1.0
base_scale_min: 0.15
base_scale_max: 2.5

# Keep the model close to persistence unless transport helps.
init_transport_gate: 0.05
transport_gate_max: 0.35
state_bias_scale: 1.0
gate_warmup_fraction: 0.2
force_gate_value: 0.8
save_transition_dump: true
transition_dump_split: val
transition_dump_every: 1
